version: 1

model:
  base_url: http://localhost:11434/v1
  name: gemma3:4b
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 30
  temperature: 0.0

generator:
  interval_minutes: 5
  retry_count: 1
  categories:
    - name: coding
    - name: research
    - name: communication
    - name: browsing
    - name: adult
  instructions: |
    Prefer matching today's planned tasks when possible.
    Today's tasks:
    ${sp_today_tasks}

classifier:
  retry_count: 2
  instructions: |
    Prefer the most specific category.
    Use unclassified when no category fits.
  params:
    work_mode: focused

tools:
  context:
    sp_today_tasks:
      run: ["sp", "task", "list", "--today"]
      timeout_seconds: 10
  actions:
    sp_start_task:
      run: ["sp", "task", "start"]
      timeout_seconds: 10
    sp_stop_task:
      run: ["sp", "task", "stop"]
      timeout_seconds: 10
    ha:
      run: ["ha"]
      timeout_seconds: 10
    telegram:
      run: ["telegram-send"]
      timeout_seconds: 10

learned: []

idle_threshold_seconds: 60
classify_idle: true
