version: 2

model:
  base_url: http://localhost:11434/v1
  name: gemma3:4b
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 30
  temperature: 0.0

classifier:
  retry_count: 2
  instructions: |
    Always choose one activity_path.
    Use task_path only when the current work clearly matches a task in tasks.yaml.
    Use adult/explicit for porn or explicit sexual content.
    Use unknown only when no configured activity fits.

allow_activities:
  - browsing/social_media
  - browsing/shopping
  - browsing/llm
  - browsing/other
  - coding/ide
  - coding/terminal
  - adult/explicit

activities:
  - path: custom/research
    description: Research work outside the built-in activity catalog
    icon: text-x-generic-symbolic

tools:
  actions:
    sp_start:
      run: ["sp", "task", "start"]
    sp_stop:
      run: ["sp", "task", "stop"]

idle_threshold_seconds: 60
classify_idle: true
