version: 2

model:
  base_url: http://localhost:11434/v1
  name: gemma3:4b
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 30
  temperature: 0.0

classifier:
  retry_count: 2
  instructions: |
    Prefer work/project-a for that repo.
    Use browsing/reference for generic reading.
    Return unknown when nothing fits.

choices:
  - path: work/project-a
    description: Main project work
    icon: laptop-symbolic
    actions:
      - tool: sp_start
        args: ["123"]
  - path: browsing/reference
    description: Reading and lookup
    icon: text-x-generic-symbolic

tools:
  actions:
    sp_start:
      run: ["sp", "task", "start"]
    sp_stop:
      run: ["sp", "task", "stop"]

idle_threshold_seconds: 60
classify_idle: true

# Import example:
# choices:
#   - import: ~/.config/waid/choices.yaml
#
# Imported files must contain the same flat choice shape:
# - path: work/project-b
#   description: Another active project
#   icon: laptop-symbolic
# - path: admin/inbox
#   description: Inbox cleanup and planning
