version: 1

model:
  base_url: http://localhost:11434/v1
  name: gemma3:4b
  api_key_env: OPENAI_API_KEY
  timeout_seconds: 30
  temperature: 0.0

generator:
  interval_minutes: 5
  retry_count: 1
  categories:
    - name: coding
    - name: writing
    - name: learning
    - name: communication
    - name: admin
    - name: browsing
    - name: media
    - name: gaming
    - name: adult
  instructions: |
    Keep the taxonomy small and practical.
    Create child categories only for active projects, recurring work, or clearly distinct distractions.

classifier:
  retry_count: 2
  instructions: |
    Classify by current intention, not just the app name.
    Prefer the most specific category.
    Switch immediately when the user's intention changes.

tools:
  context: {}
  actions: {}

learned: []

idle_threshold_seconds: 60
classify_idle: true
